<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/icon.ico" />

    <!-- Mobile Icons -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/apple-touch-icon.png"
    />

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap"
    />

    <!-- Critical assets preload -->
    <link rel="preload" as="image" href="/images/video-poster.jpg" />

    <link
      rel="preload"
      as="image"
      href="/logo.svg"
      type="image/svg+xml"
    />

    <!-- Primary SEO -->
    <title>Döwletara Düşelge — International Logistics</title>

    <meta
      name="description"
      content="International freight forwarding, customs clearance and warehousing across Central Asia and beyond."
    />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://www.dovletaraduselge.com.tm/"
    />

    <!-- Robots -->
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />

    <!-- Author -->
    <meta name="author" content="Döwletara Düşelge" />

    <!-- Geo -->
    <meta name="geo.region" content="TM" />

    <meta name="geo.placename" content="Turkmenistan" />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="Döwletara Düşelge — International Logistics"
    />

    <meta
      property="og:description"
      content="Modern logistics platform connecting global freight across 45+ countries."
    />

    <meta property="og:type" content="website" />

    <meta
      property="og:url"
      content="https://www.dovletaraduselge.com.tm/"
    />

    <meta property="og:site_name" content="Döwletara Düşelge" />

    <meta
      property="og:image"
      content="https://www.dovletaraduselge.com.tm/og-image.jpg"
    />

    <meta property="og:image:width" content="1200" />

    <meta property="og:image:height" content="630" />

    <meta
      property="og:image:alt"
      content="Döwletara Düşelge — International Logistics Platform"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Döwletara Düşelge — International Logistics"
    />

    <meta
      name="twitter:description"
      content="Modern logistics platform connecting global freight across 45+ countries."
    />

    <meta
      name="twitter:image"
      content="https://www.dovletaraduselge.com.tm/og-image.jpg"
    />
  </head>


  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
